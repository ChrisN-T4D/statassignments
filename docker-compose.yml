version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: methods-market-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: methods_market
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: methods-market-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/methods_market
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:4173
      BKT_ENGINE: neural
      JWT_SECRET: dev-local-secret-change-in-production
      ADMIN_EMAIL: admin@methodsmarket.local
      ADMIN_PASSWORD: changeme123
      RUN_DB_SEED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
